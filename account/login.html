<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Body Favors Waist Beads</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/tokens.css"><link rel="stylesheet" href="../assets/css/components.css"><link rel="stylesheet" href="../assets/css/pages.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__logo">
      <h1>Body Favors</h1>
      <p style="color:var(--color-muted);font-size:var(--text-small);margin-top:4px">Waist Beads</p>
    </div>
    <h2 class="auth-card__title">Welcome Back</h2>
    <p class="auth-card__sub">Sign in to your account to view orders and manage your details.</p>
    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="form-input" id="email" type="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" id="password" type="password" placeholder="Your password" required>
      </div>
      <button type="submit" class="btn btn--gold btn--full" style="font-size:16px;padding:16px;margin-bottom:var(--space-3)">Sign In →</button>
      <div style="text-align:center"><a href="https://www.bodyfavorswaistbeads.com/account/login#recover" target="_blank" rel="noopener" style="font-size:var(--text-small);color:var(--color-muted)">Forgot your password?</a></div>
    </form>
    <div class="auth-divider">or</div>
    <a href="https://www.bodyfavorswaistbeads.com/account/login" target="_blank" rel="noopener" class="btn btn--outline btn--full">Continue on Official Store →</a>
    <p class="auth-switch">Don't have an account? <a href="register.html">Create one →</a></p>
    <div style="text-align:center;margin-top:var(--space-4)"><a href="../index.html" style="font-size:var(--text-small);color:var(--color-muted)">← Back to Home</a></div>
  </div>
</div>
<script src="../assets/js/data.js"></script><script src="../assets/js/ui.js"></script>
<script>
function handleLogin(e) {
  e.preventDefault();
  BF_UI.showToast('Opening secure sign in on the official store', 'success');
  setTimeout(() => window.location.href = 'https://www.bodyfavorswaistbeads.com/account/login', 1000);
}
</script>
</body>
</html>
